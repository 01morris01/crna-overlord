<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>HEMODYNAMIC OVERLORD v5</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="bg"></canvas>
  <div id="app">
    <section id="splash" aria-live="polite"></section>

    <section id="game" class="hidden">
      <div id="hud">
        <div class="vb"><span class="vl">RUN</span><span class="vv" id="run-label">--</span></div>
        <div class="vb"><span class="vl">LIVES</span><span class="vv" id="lives-label">3</span></div>
        <div class="vb"><span class="vl">POINTS</span><span class="vv" id="points-label">0</span></div>
        <div class="vb"><span class="vl">BANK</span><span class="vv" id="bank-label">0</span></div>
        <div style="flex:1"></div>
        <button id="store-btn" type="button">🛒 STORE</button>
      </div>
      <div id="prog"><div id="prog-fill"></div></div>
      <div id="qctr"><span id="course-label">Course</span> — Q <span id="qn">1</span>/<span id="qt">1</span></div>
      <div id="content-note" class="content-note"></div>
      <div id="perf-panel" class="perf-panel">
        <span id="perf-acc">Accuracy: —</span>
        <span id="perf-streak">Streak: 0</span>
        <span id="perf-best-streak">Best: 0</span>
        <span id="perf-weak">Weakest: —</span>
        <span id="perf-strong">Strongest: —</span>
      </div>
      <div id="focus-hint" class="focus-hint">Focus: —</div>

      <div id="scene-row">
        <canvas id="scn" width="720" height="320"></canvas>
        <div id="ov-character">💀 OVERLORD: "Prove you deserve the airway."</div>
      </div>

      <div id="ch-wrap" class="on">
        <div id="ch-card">
          <div class="cb" id="chb">MODE</div>
          <div class="ov-setup" id="ovs"></div>
          <div class="q-text" id="qtxt"></div>
          <div id="answer-feedback" class="focus-hint">Building baseline</div>
          <div id="ans-area">
            <div id="ans-grid"></div>
            <div id="type-area" class="hidden">
              <div class="type-row">
                <input id="type-input" placeholder="Type your answer..." autocomplete="off" />
                <button id="type-submit" type="button">LOCK IN</button>
              </div>
              <div class="type-hint" id="type-hint"></div>
            </div>
            <div id="click-inst" class="hidden">👆 TAP / CLICK THE CORRECT AREA ON THE SCENE ABOVE</div>
          </div>
        </div>
      </div>
    </section>

    <div id="result">
      <div class="rv" id="r-v"></div>
      <div class="rq" id="r-q"></div>
      <div class="rex" id="r-ex"></div>
      <div class="rex" id="run-summary"></div>
      <button class="nxt-btn" id="next-btn" type="button">NEXT CHALLENGE →</button>
      <button class="nxt-btn" id="back-menu-btn" type="button">BACK TO MENUS</button>
    </div>

    <div id="store-modal">
      <div class="store-box">
        <div class="store-title">🛒 EQUIPMENT STORE</div>
        <div class="store-sub">QUICK REFILL BEFORE NEXT RUN</div>
        <div class="store-pts">YOUR BANKED POINTS: <span id="store-pts-val">0</span></div>
        <div class="store-grid" id="store-grid"></div>
        <button class="store-close" id="store-close" type="button">BACK TO OR</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
